<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>少年樂團隨機照片播放</title>
<style>
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background-color: transparent;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
  }
  #slider {
    width: 100%;
    height: 100%;
    object-fit: cover;
    opacity: 1;
    transition: opacity 1.2s ease-in-out;
  }
  .fade-out {
    opacity: 0 !important;
  }
</style>
</head>
<body>

  <img id="slider" src="" alt="Youth Band Slideshow">

<script>
  const images = [
    "https://i.postimg.cc/xN1WH4gm/IMG-0870.jpg",
    "https://i.postimg.cc/xN1WH4gM/IMG-1008.jpg",
    "https://i.postimg.cc/zbjsyrwr/IMG-1009.jpg",
    "https://i.postimg.cc/N943Kc8Y/IMG-1015.jpg"
  ];

  const slider = document.getElementById("slider");
  let currentIndex = -1;

  function getRandomImage() {
    let newIndex;
    do {
      newIndex = Math.floor(Math.random() * images.length);
    } while (newIndex === currentIndex && images.length > 1);
    
    currentIndex = newIndex;
    return images[currentIndex];
  }

  slider.src = getRandomImage();

  setInterval(() => {
    slider.classList.add("fade-out");
    setTimeout(() => {
      slider.src = getRandomImage();
      slider.classList.remove("fade-out");
    }, 1200); 
  }, 4000); 
</script>

</body>
</html>
